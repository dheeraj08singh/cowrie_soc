<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cowrie SOC Dashboard</title>

    <style>
        body {
            background-color: #0b0f14;
            color: #cfd8dc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #00e5ff;
        }

        h2 {
            color: #ffffff;
            margin-top: 30px;
        }

        .alert-box {
            background-color: #2a0d0d;
            border-left: 5px solid red;
            padding: 10px;
            margin-top: 10px;
            color: #ff6b6b;
        }

        .no-alert {
            color: #8bc34a;
            margin-top: 10px;
        }

        .events {
            margin-top: 20px;
        }

        .event-line {
            border-bottom: 1px solid #1f2a36;
            padding: 8px 0;
            font-size: 14px;
        }

        .event-line:hover {
            background-color: #111821;
        }
    </style>
</head>

<body>

    <h1>🚨 Cowrie SOC Dashboard</h1>

    <!-- Alerts Section -->
    <h2>Alerts</h2>

    {% if alert %}
        <div class="alert-box">
            🚨 {{ alert }}
        </div>
    {% else %}
        <div class="no-alert">
            ✅ No alerts detected
        </div>
    {% endif %}

    <!-- Events Section -->
    <div class="events">
        <h2>Recent Events</h2>

        {% if events %}
            {% for event in events %}
                <div class="event-line">
                    {{ event }}
                </div>
            {% endfor %}
        {% else %}
            <div>No events available</div>
        {% endif %}
    </div>

</body>
</html>
